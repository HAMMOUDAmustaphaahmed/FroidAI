</defs>

<!-- Background circles -->
<circle cx="340" cy="260" r="180" fill="none" stroke="#ffffff12" stroke-width="0.5" stroke-dasharray="3 6"/>
<circle cx="340" cy="260" r="140" fill="none" stroke="#ffffff09" stroke-width="0.3" stroke-dasharray="2 8"/>

<!-- ═══ REACT FRONTEND ═══ -->
