<text font-size="14" font-weight="600" fill="#9FE1CB" x="340" y="55" text-anchor="middle" dominant-baseline="central">React 18 — Interface utilisateur</text>
<text font-size="12" fill="#5DCAA5" x="340" y="76" text-anchor="middle" dominant-baseline="central">Dashboard · Prédiction · Projets · Extraction · Modèle IA</text>

